# WordPress function → category mapping
# Used by the LLM prompt builder to group injected mappings.
# Each entry: "php_function_name" = "CategoryName"
# Categories are injected as grouped sections in the LLM system prompt.
#
# Injection priority order (for selective prompt building):
#   High-value categories are injected first when token budget is limited.

